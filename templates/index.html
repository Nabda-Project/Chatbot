<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مساعد القلب الذكي</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .3);
            max-width: 820px;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── header ── */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 26px;
            margin-bottom: 6px;
        }

        .header p {
            opacity: .85;
            font-size: 13px;
        }

        .progress-bar {
            background: rgba(255, 255, 255, .25);
            height: 6px;
            border-radius: 3px;
            margin-top: 14px;
            overflow: hidden;
        }

        .progress-fill {
            background: #4ade80;
            height: 100%;
            width: 0%;
            transition: width .5s ease;
        }

        /* ── chat scroll area ── */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f4f6fa;
            min-height: 300px;
            max-height: 52vh;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #eee;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #aaa;
            border-radius: 3px;
        }

        /* ── messages ── */
        .msg {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            animation: fadeUp .25s ease;
        }

        .msg.user {
            flex-direction: row-reverse;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .msg.bot .avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .msg.user .avatar {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .bubble {
            max-width: 72%;
            padding: 11px 16px;
            border-radius: 16px;
            line-height: 1.65;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .msg.bot .bubble {
            background: #fff;
            border: 1px solid #e0e0e0;
            color: #333;
        }

        .msg.user .bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        /* hint banner */
        .hint-banner {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: 10px;
            padding: 9px 14px;
            color: #795548;
            font-size: 13.5px;
            margin-bottom: 8px;
        }

        /* ── input zone ── */
        .input-zone {
            padding: 18px 20px;
            background: #fff;
            border-top: 1px solid #e8e8e8;
        }

        /* number / text row */
        .text-row {
            display: flex;
            gap: 10px;
        }

        .text-row input {
            flex: 1;
            padding: 11px 16px;
            border: 2px solid #ddd;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: border-color .25s;
            font-family: inherit;
        }

        .text-row input:focus {
            border-color: #667eea;
        }

        /* option grid (choice / multi_choice) */
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .opt-btn {
            padding: 9px 16px;
            border: 2px solid #667eea;
            border-radius: 24px;
            background: #fff;
            color: #667eea;
            font-size: 14px;
            cursor: pointer;
            transition: background .2s, color .2s, transform .1s;
            font-family: inherit;
            line-height: 1.4;
        }

        .opt-btn:hover {
            background: #667eea;
            color: #fff;
            transform: translateY(-1px);
        }

        .opt-btn.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: transparent;
        }

        /* send / confirm button */
        .btn-send {
            padding: 10px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s;
            font-family: inherit;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 14px rgba(102, 126, 234, .45);
        }

        .btn-send:active {
            transform: translateY(0);
        }

        .btn-send:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
        }

        .multi-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }

        .multi-hint {
            font-size: 12px;
            color: #999;
        }

        /* controls row */
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-secondary {
            flex: 1;
            padding: 9px 14px;
            background: #6c757d;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            transition: opacity .2s;
        }

        .btn-secondary:hover {
            opacity: .85;
        }

        /* typing dots */
        .typing {
            display: none;
            padding: 12px 16px;
        }

        .typing.show {
            display: block;
        }

        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            margin: 0 2px;
            animation: dot 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: .2s;
        }

        .typing span:nth-child(3) {
            animation-delay: .4s;
        }

        @keyframes dot {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-8px);
            }
        }

        @media (max-width: 600px) {
            .bubble {
                max-width: 88%;
            }

            .opt-btn {
                font-size: 13px;
                padding: 8px 12px;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <h1>❤️ مساعد القلب الذكي</h1>
            <p>مساعدك الشخصي لجمع المعلومات الطبية قبل زيارة الطبيب</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
        </div>

        <div class="chat-area" id="chatArea"></div>

        <div class="typing" id="typing">
            <span></span><span></span><span></span>
        </div>

        <div class="input-zone" id="inputZone">
            <!-- Rebuilt dynamically by renderInput() -->
        </div>

    </div>

    <script>
        // ─────────────────────────────────────────────────────────────────────
        // State
        // ─────────────────────────────────────────────────────────────────────
        let currentQuestion = null;  // last question descriptor from the server
        let selectedCodes = [];    // for multi_choice tracking
        let busy = false;

        // FIX #13: Progress keys now match the actual field prefixes sent by
        // the server (symptom_selection, symptom_detail) instead of the
        // non-existent "symptoms" key that caused the bar to freeze at 35%.
        const STAGE_PROGRESS = {
            "demographics": 10,
            "history": 35,
            "symptom_selection": 50,
            "symptom_detail": 65,
            "symptom_loop": 70,
            "red_flags": 85,
            "free_text": 95,
        };

        // ─────────────────────────────────────────────────────────────────────
        // Boot
        // ─────────────────────────────────────────────────────────────────────
        window.addEventListener("load", () => sendToServer(null));

        // ─────────────────────────────────────────────────────────────────────
        // Chat helpers
        // ─────────────────────────────────────────────────────────────────────
        function addBotMsg(text) { _addMsg(text, "bot"); }
        function addUserMsg(text) { _addMsg(text, "user"); }

        function _addMsg(text, who) {
            const area = document.getElementById("chatArea");
            const row = document.createElement("div");
            row.className = `msg ${who}`;
            row.innerHTML = `
                <div class="avatar">${who === "bot" ? "🤖" : "👤"}</div>
                <div class="bubble">${escHtml(text)}</div>
            `;
            area.appendChild(row);
            area.scrollTop = area.scrollHeight;
        }

        function escHtml(s) {
            return String(s)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\n/g, "<br>");
        }

        function setTyping(on) {
            document.getElementById("typing").classList.toggle("show", on);
        }

        function setProgress(field) {
            const stage = (field || "").split(".")[0];
            const pct = STAGE_PROGRESS[stage] || 0;
            document.getElementById("progressBar").style.width = pct + "%";
        }

        // ─────────────────────────────────────────────────────────────────────
        // Input rendering
        // ─────────────────────────────────────────────────────────────────────
        function renderInput(question) {
            const zone = document.getElementById("inputZone");
            zone.innerHTML = "";
            selectedCodes = [];

            if (!question) return;

            const { type, options, hint } = question;

            // Hint banner (re-ask message)
            if (hint) {
                const banner = document.createElement("div");
                banner.className = "hint-banner";
                banner.textContent = hint;
                zone.appendChild(banner);
            }

            if (type === "choice") {
                // Radio-style: clicking one button sends immediately.
                const grid = document.createElement("div");
                grid.className = "options-grid";
                for (const opt of options) {
                    const btn = document.createElement("button");
                    btn.className = "opt-btn";
                    btn.textContent = opt.label;
                    btn.dataset.value = opt.value;
                    btn.addEventListener("click", () => {
                        addUserMsg(opt.label);
                        sendToServer(opt.value);
                    });
                    grid.appendChild(btn);
                }
                zone.appendChild(grid);

            } else if (type === "multi_choice") {
                // Checkbox-style: toggle multiple, then confirm.
                const grid = document.createElement("div");
                grid.className = "options-grid";
                for (const opt of options) {
                    const btn = document.createElement("button");
                    btn.className = "opt-btn";
                    btn.textContent = opt.label;
                    btn.dataset.value = opt.value;
                    btn.addEventListener("click", () => {
                        const code = opt.value;
                        if (selectedCodes.includes(code)) {
                            selectedCodes = selectedCodes.filter(c => c !== code);
                            btn.classList.remove("selected");
                        } else {
                            selectedCodes.push(code);
                            btn.classList.add("selected");
                        }
                    });
                    grid.appendChild(btn);
                }
                zone.appendChild(grid);

                const footer = document.createElement("div");
                footer.className = "multi-footer";
                footer.innerHTML = `<span class="multi-hint">يمكنك اختيار أكثر من إجابة</span>`;
                const confirmBtn = document.createElement("button");
                confirmBtn.className = "btn-send";
                confirmBtn.textContent = "تأكيد الاختيار ✓";
                confirmBtn.addEventListener("click", () => {
                    if (selectedCodes.length === 0) {
                        alert("الرجاء تحديد خيار واحد على الأقل.");
                        return;
                    }
                    const labels = selectedCodes.map(code => {
                        const match = options.find(o => o.value === code);
                        return match ? match.label : code;
                    });
                    addUserMsg(labels.join("، "));
                    sendToServer([...selectedCodes]);
                });
                footer.appendChild(confirmBtn);
                zone.appendChild(footer);

            } else {
                // number or text – plain input + send button.
                const row = document.createElement("div");
                row.className = "text-row";
                const input = document.createElement("input");
                input.type = type === "number" ? "number" : "text";
                input.placeholder = type === "number" ? "أدخل رقماً…" : "اكتب إجابتك…";
                input.id = "textInput";
                input.addEventListener("keydown", e => {
                    if (e.key === "Enter") confirmText(input);
                });
                const sendBtn = document.createElement("button");
                sendBtn.className = "btn-send";
                sendBtn.textContent = "إرسال";
                sendBtn.addEventListener("click", () => confirmText(input));
                row.appendChild(input);
                row.appendChild(sendBtn);
                zone.appendChild(row);
                setTimeout(() => input.focus(), 50);
            }

            // Always append Reset button at the bottom.
            const controls = document.createElement("div");
            controls.className = "controls";
            const resetBtn = document.createElement("button");
            resetBtn.className = "btn-secondary";
            resetBtn.textContent = "🔄 بدء محادثة جديدة";
            // FIX #12: Use addEventListener consistently instead of inline onclick.
            resetBtn.addEventListener("click", resetChat);
            controls.appendChild(resetBtn);
            zone.appendChild(controls);
        }

        function confirmText(input) {
            const val = input.value.trim();
            if (!val) return;
            addUserMsg(val);
            input.value = "";
            sendToServer(val);
        }

        // ─────────────────────────────────────────────────────────────────────
        // Server communication
        // ─────────────────────────────────────────────────────────────────────
        async function sendToServer(payload) {
            if (busy) return;
            busy = true;
            setTyping(true);
            document.getElementById("inputZone").innerHTML = "";  // clear while waiting

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    // FIX #14: credentials:"include" ensures the session cookie
                    // is sent reliably even in environments with stricter defaults.
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: payload }),
                });
                const data = await res.json();

                setTyping(false);

                if (!data.success) {
                    addBotMsg("⚠️ خطأ: " + (data.error || "غير معروف"));
                    renderInput(currentQuestion);  // re-render last question
                    return;
                }

                if (data.done) {
                    addBotMsg(data.reply || "اكتمل التحليل.");
                    document.getElementById("progressBar").style.width = "100%";
                    // FIX #12: Build the final reset button via DOM, not innerHTML+onclick.
                    const zone = document.getElementById("inputZone");
                    const controls = document.createElement("div");
                    controls.className = "controls";
                    const resetBtn = document.createElement("button");
                    resetBtn.className = "btn-secondary";
                    resetBtn.textContent = "🔄 بدء محادثة جديدة";
                    resetBtn.addEventListener("click", resetChat);
                    controls.appendChild(resetBtn);
                    zone.appendChild(controls);
                    return;
                }

                // New question
                const q = data.question;
                currentQuestion = q;
                setProgress(q.field);

                // Show question text as bot message (with hint if present).
                let display = q.question_text;
                if (q.hint) display = q.hint + "\n\n" + q.question_text;
                addBotMsg(display);

                renderInput(q);

            } catch (err) {
                setTyping(false);
                addBotMsg("⚠️ خطأ في الاتصال. الرجاء المحاولة مرة أخرى.");
                renderInput(currentQuestion);
                console.error(err);
            } finally {
                busy = false;
            }
        }

        // ─────────────────────────────────────────────────────────────────────
        // Reset
        // ─────────────────────────────────────────────────────────────────────
        async function resetChat() {
            if (!confirm("هل أنت متأكد من إعادة بدء المحادثة؟")) return;
            try {
                // FIX #14: Include credentials so the session cookie is sent.
                await fetch("/reset", { method: "POST", credentials: "include" });
            } catch (_) { /* ignore network errors during reset */ }
            document.getElementById("chatArea").innerHTML = "";
            document.getElementById("progressBar").style.width = "0%";
            currentQuestion = null;
            selectedCodes = [];
            sendToServer(null);
        }
    </script>
</body>

</html>
