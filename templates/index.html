<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مساعد القلب الذكي | Heart Care Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 800px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .header p {
      opacity: 0.9;
      font-size: 14px;
    }

    .progress-bar {
      background: rgba(255,255,255,0.2);
      height: 6px;
      margin-top: 15px;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      background: #4ade80;
      height: 100%;
      width: 0%;
      transition: width 0.5s ease;
    }

    .chat-container {
      height: 500px;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }

    .message {
      margin-bottom: 15px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.bot {
      display: flex;
      gap: 10px;
    }

    .message.user {
      display: flex;
      gap: 10px;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .bot .avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .user .avatar {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .message-content {
      max-width: 70%;
      padding: 12px 18px;
      border-radius: 18px;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .bot .message-content {
      background: white;
      color: #333;
      border: 1px solid #e0e0e0;
    }

    .user .message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e0e0e0;
    }

    .input-container {
      display: flex;
      gap: 10px;
    }

    #userInput {
      flex: 1;
      padding: 12px 18px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
    }

    #userInput:focus {
      border-color: #667eea;
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-secondary {
      background: #6c757d;
      flex: 1;
    }

    .typing-indicator {
      display: none;
      padding: 10px;
      background: white;
      border-radius: 18px;
      width: fit-content;
    }

    .typing-indicator.active {
      display: block;
    }

    .typing-indicator span {
      height: 8px;
      width: 8px;
      background: #667eea;
      border-radius: 50%;
      display: inline-block;
      margin: 0 2px;
      animation: typing 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        transform: translateY(0);
      }
      30% {
        transform: translateY(-10px);
      }
    }

    .alert {
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      display: none;
    }

    .alert.show {
      display: block;
      animation: slideIn 0.3s ease;
    }

    .alert-urgent {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .alert-warning {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Scrollbar styling */
    .chat-container::-webkit-scrollbar {
      width: 6px;
    }

    .chat-container::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .chat-container::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 3px;
    }

    .chat-container::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        height: 100vh;
        border-radius: 0;
      }

      .message-content {
        max-width: 85%;
      }

      .header h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>
        <span>❤️</span>
        مساعد القلب الذكي
      </h1>
      <p>مساعدك الشخصي لجمع المعلومات الطبية قبل زيارة الطبيب</p>
      <div class="progress-bar">
        <div class="progress-fill" id="progressBar"></div>
      </div>
    </div>

    <!-- Alert Area -->
    <div id="alertArea"></div>

    <!-- Chat Area -->
    <div class="chat-container" id="chatContainer">
      <!-- Messages will appear here -->
    </div>

    <!-- Typing Indicator -->
    <div class="typing-indicator" id="typingIndicator">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-container">
        <input 
          type="text" 
          id="userInput" 
          placeholder="اكتب رسالتك هنا..." 
          autocomplete="off"
        >
        <button onclick="sendMessage()" id="sendBtn">
          إرسال
        </button>
      </div>
      <div class="controls">
        <button class="btn-secondary" onclick="simulateVitals()">
          📊 محاكاة قياسات حيوية
        </button>
        <button class="btn-secondary" onclick="resetChat()">
          🔄 بدء محادثة جديدة
        </button>
      </div>
    </div>
  </div>

  <script>
    let currentProgress = 0;

    // Initialize chat
    window.addEventListener('load', () => {
      sendMessage('', true); // Start conversation
    });

    // Enter key to send
    document.getElementById('userInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    function addMessage(text, isBot = false) {
      const chatContainer = document.getElementById('chatContainer');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isBot ? 'bot' : 'user'}`;
      
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = isBot ? '🤖' : '👤';
      
      const content = document.createElement('div');
      content.className = 'message-content';
      content.innerHTML = text.replace(/\n/g, '<br>');
      
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(content);
      chatContainer.appendChild(messageDiv);
      
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function showTypingIndicator() {
      document.getElementById('typingIndicator').classList.add('active');
    }

    function hideTypingIndicator() {
      document.getElementById('typingIndicator').classList.remove('active');
    }

    function updateProgress(progress) {
      currentProgress = progress;
      document.getElementById('progressBar').style.width = progress + '%';
    }

    function showAlert(message, type = 'warning') {
      const alertArea = document.getElementById('alertArea');
      const alert = document.createElement('div');
      alert.className = `alert alert-${type} show`;
      alert.textContent = message;
      alertArea.appendChild(alert);
      
      setTimeout(() => {
        alert.classList.remove('show');
        setTimeout(() => alert.remove(), 300);
      }, 5000);
    }

    async function sendMessage(message = null, isInitial = false) {
      const input = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      
      const msg = message !== null ? message : input.value.trim();
      
      if (!msg && !isInitial) return;

      // Disable input
      input.disabled = true;
      sendBtn.disabled = true;

      // Add user message
      if (msg && !isInitial) {
        addMessage(msg, false);
        input.value = '';
      }

      // Show typing indicator
      showTypingIndicator();

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });

        const data = await response.json();

        // Hide typing indicator
        hideTypingIndicator();

        if (data.success) {
          // Add bot response
          addMessage(data.reply, true);

          // Update progress
          if (data.progress !== undefined) {
            updateProgress(data.progress);
          }

          // Show alerts if urgent
          if (data.urgency === 'urgent') {
            showAlert('⚠️ تحذير: القياسات تحتاج متابعة فورية!', 'urgent');
          } else if (data.urgency === 'soon') {
            showAlert('ℹ️ ملاحظة: يُنصح بمتابعة الطبيب قريباً', 'warning');
          }

          // If conversation ended, show download option
          if (data.full_report) {
            setTimeout(() => {
              addMessage('يمكنك الآن تحميل التقرير الطبي الكامل أو البدء في محادثة جديدة.', true);
            }, 1000);
          }
        } else {
          addMessage('عذراً، حدث خطأ: ' + (data.error || 'غير معروف'), true);
        }

      } catch (error) {
        hideTypingIndicator();
        addMessage('عذراً، حدث خطأ في الاتصال. من فضلك تحقق من الاتصال بالإنترنت.', true);
        console.error('Error:', error);
      } finally {
        // Re-enable input
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    async function simulateVitals() {
      // Simulate sending vital signs from wearable
      const vitals = {
        heart_rate: Math.floor(Math.random() * 40) + 70, // 70-110
        blood_pressure: {
          systolic: Math.floor(Math.random() * 40) + 110, // 110-150
          diastolic: Math.floor(Math.random() * 20) + 70  // 70-90
        },
        spo2: Math.floor(Math.random() * 6) + 95 // 95-100
      };

      showTypingIndicator();

      try {
        const response = await fetch('/vitals', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(vitals)
        });

        const data = await response.json();
        hideTypingIndicator();

        if (data.success) {
          addMessage(data.reply, true);
          if (data.progress) updateProgress(data.progress);
          if (data.urgency === 'urgent') {
            showAlert('⚠️ تحذير: قياسات حرجة!', 'urgent');
          }
        }
      } catch (error) {
        hideTypingIndicator();
        console.error('Error:', error);
      }
    }

    async function resetChat() {
      if (!confirm('هل أنت متأكد من إعادة بدء المحادثة؟')) return;

      try {
        const response = await fetch('/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        const data = await response.json();

        if (data.success) {
          document.getElementById('chatContainer').innerHTML = '';
          updateProgress(0);
          sendMessage('', true);
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }
  </script>

</body>
</html>
